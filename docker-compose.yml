version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg14
    container_name: airguard_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-airguard_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d airguard_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: airguard_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-airguard_db}
    volumes:
      - ./backend:/app
      - ./models:/app/models
      - ./data:/app/data
      - ./configs:/app/configs

volumes:
  postgres_data:
